<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMXBC | Widget Caméra (4:3 Néon Fixé)</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#95ff66' }
                }
            }
        }
    </script>
    
    <style>
        /* BASE (Transparent pour OBS) */
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: transparent; 
        }

        /* --- FOND DE PRÉVISUALISATION --- */
        .preview-bg {
            position: absolute;
            inset: 0;
            background-color: #030005;
            background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920&h=1080&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            display: none;
        }

        /* --- LUMIÈRE AMBIANTE DE FOND --- */
        .cam-glow {
            position: absolute;
            inset: -120px;
            background: radial-gradient(circle, rgba(149,255,102,0.2) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- LE CADRE NÉON (Plus de coupure SVG) --- */
        .neon-frame {
            position: absolute;
            inset: 0;
            box-sizing: border-box;
            border: 20px solid #95ff66; /* Épaisseur parfaite */
            border-radius: 40px;
            z-index: 10;
            pointer-events: none;
            /* La lueur baveuse qui ne sera jamais coupée */
            box-shadow: 
                0 0 40px rgba(149, 255, 102, 0.8), 
                0 0 90px rgba(149, 255, 102, 0.4), 
                inset 0 0 30px rgba(149, 255, 102, 0.6);
        }

        /* Le coeur blanc incandescent du Néon */
        .neon-frame::after {
            content: '';
            position: absolute;
            inset: -12px; /* Centre le trait blanc au milieu du vert */
            border: 4px solid #ffffff;
            border-radius: 28px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            opacity: 0.9;
        }

        /* --- EFFET VHS VIVANT ET ANIMÉ --- */
        .vhs-container {
            position: absolute;
            /* On le rentre un peu pour qu'il ne dépasse pas du cadre arrondi */
            inset: 10px;
            border-radius: 30px; 
            overflow: hidden;
            pointer-events: none;
            z-index: 5; /* Entre la caméra OBS (derrière) et le cadre Néon */
        }

        .vhs-noise {
            position: absolute;
            inset: -100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)"/%3E%3C/svg%3E');
            opacity: 0.08;
            z-index: 1;
            animation: noise-jitter 0.1s infinite;
        }

        .vhs-scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
            background-size: 100% 6px;
            z-index: 2;
            animation: scroll-scanlines 10s linear infinite;
        }

        .vhs-tracking {
            position: absolute;
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.01);
            top: -100px;
            z-index: 3;
            animation: vhs-track 7s infinite linear;
        }

        .vhs-vignette {
            position: absolute;
            inset: 0;
            z-index: 4;
            animation: rgb-pulse 4s infinite alternate ease-in-out;
        }

        @keyframes scroll-scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 100vh; }
        }

        @keyframes noise-jitter {
            0% { transform: translate(0, 0); }
            25% { transform: translate(1%, -1%); }
            50% { transform: translate(-1%, 1%); }
            75% { transform: translate(-1%, -1%); }
            100% { transform: translate(1%, 1%); }
        }

        @keyframes vhs-track {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        @keyframes rgb-pulse {
            0% {
                box-shadow: 
                    inset 0 0 100px rgba(0,0,0, 0.6), 
                    inset 6px 0 15px rgba(255, 0, 0, 0.08), 
                    inset -6px 0 15px rgba(0, 0, 255, 0.08);
            }
            100% {
                box-shadow: 
                    inset 0 0 120px rgba(0,0,0, 0.7), 
                    inset 12px 0 25px rgba(255, 0, 0, 0.12), 
                    inset -12px 0 25px rgba(0, 0, 255, 0.12);
            }
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- Fond de test (Désactivé) -->
    <div class="preview-bg" id="preview-bg"></div>
    
    <!-- Bouton Dev -->
    <button onclick="toggleBackground()" class="absolute top-4 left-4 z-50 bg-brand text-black px-3 py-1 text-xs font-black uppercase rounded hover:bg-white transition-colors">
        Afficher Fausse Cam
    </button>

    <!-- ========================================== -->
    <!-- WIDGET CAMÉRA 4:3 (1280x960)               -->
    <!-- ========================================== -->
    
    <div class="relative w-[1280px] h-[960px]">
        
        <!-- Glow d'ambiance lointain -->
        <div class="cam-glow"></div>

        <!-- LE FILTRE VHS DYNAMIQUE (Qui teintera ta caméra OBS) -->
        <div class="vhs-container">
            <div class="vhs-noise"></div>
            <div class="vhs-scanlines"></div>
            <div class="vhs-tracking"></div>
            <div class="vhs-vignette"></div>
        </div>
        
        <!-- LE CADRE NÉON (Pur CSS, aucune coupure possible) -->
        <div class="neon-frame"></div>
        
    </div>

    <!-- Scripts -->
    <script>
        function toggleBackground() {
            const bg = document.getElementById('preview-bg');
            bg.style.display = bg.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
