<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMXBC | Widget Caméra (4:3)</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#95ff66' },
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        /* BASE (Transparent pour OBS) */
        body {
            margin: 0;
            padding: 0;
            /* Format d'écran standard 1080p */
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            background-color: transparent; 
        }

        /* --- FOND DE PRÉVISUALISATION (Caché par défaut, utile pour tester) --- */
        .preview-bg {
            position: absolute;
            inset: 0;
            background-color: #030005;
            background-image: radial-gradient(circle, rgba(149,255,102,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
            display: none;
        }

        /* --- EFFETS DE LUMIÈRE & MATIÈRE --- */
        .cam-glow {
            position: absolute;
            inset: -80px;
            background: radial-gradient(circle, rgba(149,255,102,0.2) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- Fond de prévisualisation (désactivé par défaut) -->
    <div class="preview-bg" id="preview-bg"></div>
    
    <!-- Bouton Dev -->
    <button onclick="toggleBackground()" class="absolute top-4 left-4 z-50 bg-brand text-black px-3 py-1 text-xs font-black uppercase rounded hover:bg-white transition-colors">
        Afficher/Cacher Fond
    </button>

    <!-- ========================================== -->
    <!-- WIDGET CAMÉRA 4:3 (Bordure Ultra Grasse)   -->
    <!-- ========================================== -->
    
    <!-- Le cadre Webcam (Taille 4:3 : 1280x960) -->
    <div class="relative w-[1280px] h-[960px]">
        
        <!-- Lumière ambiante derrière la cam -->
        <div class="cam-glow"></div>
        
        <!-- L'ASTUCE DU POCHOIR (SVG) -->
        <svg width="1280" height="960" class="absolute inset-0 z-10 pointer-events-none">
            <defs>
                <mask id="cam-hole">
                    <!-- Fond blanc = Partie opaque de l'overlay -->
                    <rect width="100%" height="100%" fill="white" />
                    <!-- Trou central avec des angles ronds. On laisse une marge de 24px pour que le trait épais ne soit pas coupé aux bords -->
                    <rect x="24" y="24" width="1232" height="912" rx="40" fill="black" />
                </mask>
                
                <!-- Glow du néon adapté à l'épaisseur -->
                <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="15" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
            
            <!-- Le Cache -->
            <rect width="100%" height="100%" fill="#050505" mask="url(#cam-hole)" />
            
            <!-- La lueur Néon Verte TRES EPAISSE (stroke-width: 32) -->
            <rect x="24" y="24" width="1232" height="912" rx="40" fill="none" stroke="#95ff66" stroke-width="32" filter="url(#neon-glow)" />
            
            <!-- Le coeur du Néon (Blanc) plus épais aussi (stroke-width: 8) -->
            <rect x="24" y="24" width="1232" height="912" rx="40" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.9" />
        </svg>

        <!-- Guide Visuel pour t'aider sur OBS -->
        <div class="w-full h-full absolute inset-0 flex items-center justify-center bg-black/40 z-0 border border-dashed border-white/20">
            <p class="text-white/30 font-black tracking-widest uppercase text-xl text-center leading-relaxed">
                Espace Caméra OBS<br>
                <span class="text-brand/50 text-3xl">1280 x 960</span>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        function toggleBackground() {
            const bg = document.getElementById('preview-bg');
            bg.style.display = bg.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
