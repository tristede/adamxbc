<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMXBC | Widget Caméra (4:3 avec VHS Animé)</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#95ff66' },
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        /* BASE (Transparent pour OBS) */
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            background-color: transparent; 
        }

        /* --- FOND DE PRÉVISUALISATION (Fausse image pour tester l'effet VHS) --- */
        .preview-bg {
            position: absolute;
            inset: 0;
            background-color: #030005;
            background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920&h=1080&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            display: none;
        }

        /* --- EFFETS DE LUMIÈRE --- */
        .cam-glow {
            position: absolute;
            inset: -80px;
            background: radial-gradient(circle, rgba(149,255,102,0.25) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- EFFET VHS VIVANT ET ANIMÉ --- */
        .vhs-container {
            position: absolute;
            /* Recadré pour s'insérer pile à l'intérieur de la grosse bordure néon */
            top: 56px; left: 56px;
            width: 1168px; height: 848px;
            border-radius: 16px; /* Arrondi interne */
            overflow: hidden;
            pointer-events: none;
            z-index: 5; /* Par-dessus ta cam OBS, mais derrière le trait néon */
        }

        /* 1. Bruit statique (Noise) animé */
        .vhs-noise {
            position: absolute;
            inset: -100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)"/%3E%3C/svg%3E');
            opacity: 0.08;
            z-index: 1;
            animation: noise-jitter 0.1s infinite;
        }

        /* 2. Lignes TV qui défilent en continu */
        .vhs-scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
            background-size: 100% 6px;
            z-index: 2;
            animation: scroll-scanlines 10s linear infinite;
        }

        /* 3. Bande de Glitch (Tracking) */
        .vhs-tracking {
            position: absolute;
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.01);
            top: -100px;
            z-index: 3;
            animation: vhs-track 7s infinite linear;
        }

        /* 4. Vignette et Aberration Chromatique Pulsante */
        .vhs-vignette {
            position: absolute;
            inset: 0;
            z-index: 4;
            animation: rgb-pulse 4s infinite alternate ease-in-out;
        }

        /* Animations du VHS */
        @keyframes scroll-scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 100vh; }
        }

        @keyframes noise-jitter {
            0% { transform: translate(0, 0); }
            25% { transform: translate(1%, -1%); }
            50% { transform: translate(-1%, 1%); }
            75% { transform: translate(-1%, -1%); }
            100% { transform: translate(1%, 1%); }
        }

        @keyframes vhs-track {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        @keyframes rgb-pulse {
            0% {
                box-shadow: 
                    inset 0 0 100px rgba(0,0,0, 0.6), 
                    inset 6px 0 15px rgba(255, 0, 0, 0.08), 
                    inset -6px 0 15px rgba(0, 0, 255, 0.08);
            }
            100% {
                box-shadow: 
                    inset 0 0 120px rgba(0,0,0, 0.7), 
                    inset 12px 0 25px rgba(255, 0, 0, 0.12), 
                    inset -12px 0 25px rgba(0, 0, 255, 0.12);
            }
        }

        /* --- ANIMATION ORGANIQUE (BLOB) --- */
        .blob-morph {
            border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%;
            animation: morph 8s ease-in-out infinite;
        }

        @keyframes morph {
            0%   { border-radius: 35% 65% 45% 55% / 45% 35% 65% 55%; }
            33%  { border-radius: 65% 35% 55% 45% / 55% 65% 35% 45%; }
            66%  { border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%; }
            100% { border-radius: 35% 65% 45% 55% / 45% 35% 65% 55%; }
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- Fond de prévisualisation (désactivé par défaut) -->
    <div class="preview-bg" id="preview-bg"></div>
    
    <!-- Bouton Dev -->
    <button onclick="toggleBackground()" class="absolute top-4 left-4 z-50 bg-brand text-black px-3 py-1 text-xs font-black uppercase rounded hover:bg-white transition-colors">
        Afficher/Cacher Fausse Cam (Test)
    </button>

    <!-- ========================================== -->
    <!-- WIDGET CAMÉRA 4:3 (ULTRA BORDURE NÉON)     -->
    <!-- ========================================== -->
    
    <div class="relative w-[1280px] h-[960px]">
        
        <!-- Lumière ambiante derrière la cam -->
        <div class="cam-glow"></div>

        <!-- LE FILTRE VHS DYNAMIQUE (Recouvrira la caméra OBS) -->
        <div class="vhs-container">
            <div class="vhs-noise"></div>
            <div class="vhs-scanlines"></div>
            <div class="vhs-tracking"></div>
            <div class="vhs-vignette"></div>
        </div>
        
        <!-- LE CADRE NÉON SVG (SANS FOND NOIR) -->
        <svg width="1280" height="960" class="absolute inset-0 z-10 pointer-events-none">
            <defs>
                <!-- Glow du néon -->
                <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="15" result="blur1" />
                    <feGaussianBlur stdDeviation="35" result="blur2" />
                    <feMerge>
                        <feMergeNode in="blur2" />
                        <feMergeNode in="blur1" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
            
            <!-- LE MASQUE NOIR EST SUPPRIMÉ ICI -->
            <!-- TOUT LE RESTE EST TRANSPARENT -->
            
            <!-- La lueur Néon Verte TRES EPAISSE (48px de large !) -->
            <rect x="32" y="32" width="1216" height="896" rx="40" fill="none" stroke="#95ff66" stroke-width="48" filter="url(#neon-glow)" />
            
            <!-- Le coeur du Néon (Blanc) -->
            <rect x="32" y="32" width="1216" height="896" rx="40" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.9" />
        </svg>

        <!-- Badge LIVE (Blob organique) -->
        <div class="absolute -top-6 -right-6 w-24 h-24 bg-brand blob-morph flex items-center justify-center text-black shadow-[0_0_30px_rgba(149,255,102,0.5)] z-20">
            <span class="font-display font-black text-xl tracking-tighter">LIVE</span>
        </div>
        
    </div>

    <!-- Scripts -->
    <script>
        function toggleBackground() {
            const bg = document.getElementById('preview-bg');
            bg.style.display = bg.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
