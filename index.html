    <style>
        body {
            background-color: #030005; 
            margin: 0;
            color: #ffffff;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* --- GLOW AMBIANT --- */
        .ambient-glow {
            position: fixed;
            width: 55vw; 
            height: 55vw;
            background: radial-gradient(circle, rgba(149,255,102,0.03) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* --- ANIMATIONS DE BASE --- */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(var(--drag-x, 0px), calc(var(--drag-y, 0px) + 17px)); } 
            to { opacity: 1; transform: translate(var(--drag-x, 0px), var(--drag-y, 0px)); }
        }

        .blob-morph {
            border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%;
            animation: morph 12s ease-in-out infinite;
        }

        @keyframes morph {
            0%   { border-radius: 35% 65% 45% 55% / 45% 35% 65% 55%; }
            33%  { border-radius: 65% 35% 55% 45% / 55% 65% 35% 45%; }
            66%  { border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%; }
            100% { border-radius: 35% 65% 45% 55% / 45% 35% 65% 55%; }
        }

        /* --- REFLET DU TITRE (PIXEL ART) --- */
        .glow-title {
            background: linear-gradient(
                110deg,
                #ffffff 0%,
                #ffffff 45%,
                #b0b5b9 45%, #b0b5b9 48%, 
                #ffffff 48%, #ffffff 50%, 
                #b0b5b9 50%, #b0b5b9 52%, 
                #ffffff 52%, #ffffff 100%
            );
            background-size: 400% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(149, 255, 102, 0.4));
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            animation: textShine 5s steps(25) infinite;
        }

        @keyframes textShine {
            0% { background-position: 100% center; } 
            40% { background-position: 0% center; }  
            100% { background-position: 0% center; } 
        }

        /* --- BOUTONS --- */
        .btn-active {
            background-color: #95ff66; 
            color: #000;
            border-radius: 18px; 
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 4.4px 11px rgba(149, 255, 102, 0.1);
            padding: 18px 24px; 
            position: relative;
            overflow: hidden;
        }

        .btn-active:hover {
            transform: translateY(-2.2px) scale(1.02) !important;
            box-shadow: 0 0 33px rgba(149, 255, 102, 0.4);
            background-color: #b3ff8c;
        }

        /* --- REFLETS SUR LES BOUTONS (PIXEL ART) --- */
        .btn-active::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100px;
            width: 50px;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%,
                rgba(220, 255, 180, 0.9) 0%, rgba(220, 255, 180, 0.9) 40%,
                transparent 40%, transparent 60%,
                rgba(220, 255, 180, 0.5) 60%, rgba(220, 255, 180, 0.5) 80%,
                transparent 80%
            );
            transform: skewX(-25deg);
            pointer-events: none;
            z-index: 10;
        }

        @keyframes btnShine1 { 0% { left: -100px; } 25% { left: 120%; } 100% { left: 120%; } }
        @keyframes btnShine2 { 0% { left: -100px; } 20% { left: 120%; } 100% { left: 120%; } }
        @keyframes btnShine3 { 0% { left: -100px; } 28% { left: 120%; } 100% { left: 120%; } }

        .shine-1::after { animation: btnShine1 6.5s steps(20) infinite; }
        .shine-2::after { animation: btnShine2 8.2s steps(20) infinite 1.5s; }
        .shine-3::after { animation: btnShine3 7.4s steps(20) infinite 0.8s; }

        /* --- BOUTON DISCORD --- */
        .btn-inverted {
            background-color: #050505; 
            color: #95ff66;
            border: 2px solid #95ff66;
            border-radius: 18px; 
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 4.4px 11px rgba(149, 255, 102, 0.1), inset 0 0 15px rgba(149, 255, 102, 0.05);
            padding: 27px 24px; 
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .btn-inverted:hover {
            transform: translateY(-2.2px) scale(1.02) !important;
            box-shadow: 0 0 33px rgba(149, 255, 102, 0.4), inset 0 0 20px rgba(149, 255, 102, 0.15);
            background-color: #0a0a0a;
        }

        .btn-inverted::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100px;
            width: 50px;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%,
                rgba(149, 255, 102, 0.8) 0%, rgba(149, 255, 102, 0.8) 40%,
                transparent 40%, transparent 60%,
                rgba(149, 255, 102, 0.4) 60%, rgba(149, 255, 102, 0.4) 80%,
                transparent 80%
            );
            transform: skewX(-25deg);
            pointer-events: none;
            z-index: 10;
        }
        .shine-inverted::after { animation: btnShine1 7.5s steps(20) infinite 2s; }

        .icon-blob-inverted {
            width: 44px; 
            height: 44px;
            background: #95ff66;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px; 
            flex-shrink: 0;
        }

        .anim-float { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2.5px); } 
        }

        .btn-disabled {
            background-color: #0f0f0f;
            color: #444;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 18px 24px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .icon-blob {
            width: 40px; 
            height: 40px;
            background: #000;
            color: #95ff66;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px; 
            flex-shrink: 0;
        }

        .mobile-wrapper {
            max-width: 440px; 
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 55px 22px; 
            position: relative;
        }

        /* --- HOVER EFFET PP (RENFONCEMENT) --- */
        #pp-toggle:hover {
            transform: scale(0.96) !important;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 0 35px rgba(149,255,102,0.5) !important;
        }
        #pp-toggle:active {
            transform: scale(0.92) !important;
        }

        /* --- ANIMATION DE L'IMAGE DANS LE BLOB --- */
        #pp-toggle img {
            transition: transform 0.5s ease-out;
            animation: imageFloat 14s ease-in-out infinite;
            transform: scale(1.1); /* Zoom léger pour masquer les bords pendant le mouvement */
        }

        @keyframes imageFloat {
            0%, 100% { transform: scale(1.1) translate(0, 0); }
            25% { transform: scale(1.15) translate(5px, -5px); }
            50% { transform: scale(1.1) translate(-3px, 5px); }
            75% { transform: scale(1.12) translate(-5px, -3px); }
        }

        /* --- BARRE DE SÉPARATION AMÉLIORÉE (VISIBLE) --- */
        .divider {
            width: 100%;
            height: 1.5px;
            background: rgba(255, 255, 255, 0.25);
            margin: 25px 0;
            position: relative;
            box-shadow: 0 0 12px rgba(149, 255, 102, 0.15);
        }
    </style>

            </div>
        </main>
    </div>

    <script>
        // --- PRÉCHARGEMENT AUDIO ---
        const acceptAudio = new Audio('accept_cookies.mp3');
        acceptAudio.preload = 'auto';
        acceptAudio.load(); 

        // --- POPUPS GENERIC ---
        const noticePopup = document.getElementById('notice-popup');
        const noticeOverlay = document.getElementById('notice-overlay');
        const noticeTitle = document.getElementById('notice-title');
        const noticeText = document.getElementById('notice-text');
        const noticeIcon = document.getElementById('notice-icon');

        function showNotice(type) {
            if(type === 'ytb') {
                noticeTitle.innerText = "YouTube en chantier !";
                noticeText.innerText = "La chaîne est en préparation. Ça arrive bientôt chef !";
                noticeIcon.className = "fa-solid fa-person-digging text-brand text-xl";
            } else {
                noticeTitle.innerText = "Discord en travaux !";
                noticeText.innerText = "Le serveur est en cours de configuration. Un peu de patience !";
                noticeIcon.className = "fa-brands fa-discord text-brand text-xl";
            }
            noticePopup.classList.remove('hidden');
            noticeOverlay.classList.remove('hidden');
            setTimeout(() => {
                noticePopup.classList.remove('opacity-0', 'scale-95');
                noticeOverlay.classList.remove('opacity-0');
            }, 10);
        }

        function closeNotice() {
            noticePopup.classList.add('opacity-0', 'scale-95');
            noticeOverlay.classList.add('opacity-0');
            setTimeout(() => {
                noticePopup.classList.add('hidden');
                noticeOverlay.classList.add('hidden');
            }, 300);
        }

        // --- DISCORD POPUP ---
        const dPopup = document.getElementById('discord-popup');
        const dOverlay = document.getElementById('discord-overlay');
        function openDiscord() {
            dPopup.classList.remove('hidden');
            dOverlay.classList.remove('hidden');
            setTimeout(() => { dPopup.classList.remove('opacity-0', 'scale-95'); dOverlay.classList.remove('opacity-0'); }, 10);
        }
        function closeDiscord() {
            dPopup.classList.add('opacity-0', 'scale-95');
            dOverlay.classList.add('opacity-0');
            setTimeout(() => { dPopup.classList.add('hidden'); dOverlay.classList.add('hidden'); }, 300);
        }

        // --- COOKIES ---
        const cookiePopup = document.getElementById('cookie-popup');
        window.addEventListener('load', () => {
            if (!localStorage.getItem('cookies_v9')) {
                setTimeout(() => { cookiePopup.classList.remove('hidden'); }, 1500);
            }
        });

        function handleAccept() { 
            acceptAudio.play().catch(e => console.log("Audio bloqué ou non trouvé"));
            localStorage.setItem('cookies_v9', 'true'); 
            cookiePopup.classList.add('hidden'); 
        }

        function handleRefuse() { document.getElementById('cookie-text').innerText = "Tu joues à quoi ? Clique sur Ok !"; }

        // --- WHEEL TOGGLE ---
        const wheel = document.getElementById('wheel-container');
        const ppToggle = document.getElementById('pp-toggle');
        
        ppToggle.addEventListener('click', (e) => {
            const isHidden = wheel.classList.contains('opacity-0');
            if(isHidden) {
                wheel.classList.remove('opacity-0', 'scale-50', 'pointer-events-none');
            } else {
                wheel.classList.add('opacity-0', 'scale-50', 'pointer-events-none');
            }
        });

        // --- EFFET MAGNÉTIQUE ---
        const magneticWrappers = document.querySelectorAll('.magnetic-wrapper');
        let mX = 0, mY = 0;
        document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; });

        function renderMagnetic() {
            if (!wheel.classList.contains('opacity-0')) {
                magneticWrappers.forEach(w => {
                    const r = w.parentElement.getBoundingClientRect();
                    const centerX = r.left + r.width / 2;
                    const centerY = r.top + r.height / 2;
                    const dx = mX - centerX;
                    const dy = mY - centerY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < 80) {
                        w.style.transform = `translate(${dx * 0.35}px, ${dy * 0.35}px)`;
                    } else {
                        w.style.transform = `translate(0, 0)`;
                    }
                });
            }
            requestAnimationFrame(renderMagnetic);
        }
        renderMagnetic();

        // --- MATRIX YTB ---
        const c = document.getElementById('ytb-matrix');
        const ctx = c.getContext('2d');
        let drops = [];
        function initM() {
            if(c) {
                c.width = c.parentElement.offsetWidth;
                c.height = c.parentElement.offsetHeight;
                drops = Array(Math.floor(c.width/8)).fill(0);
            }
        }
        window.addEventListener('resize', initM);
        initM();
        function drawM() {
            if(!ctx) return;
            ctx.fillStyle = 'rgba(15,15,15,0.3)'; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = 'rgba(149,255,102,0.5)'; ctx.font = '8px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i*8, y*8);
                if(y*8 > c.height && Math.random() > 0.98) drops[i] = 0;
                else drops[i]++;
            });
        }
        setInterval(drawM, 130);
    </script>
</body>
</html>
