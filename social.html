<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMXBC | Widget Réseaux Sociaux</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
    
    <!-- Icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#95ff66' },
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        /* BASE (Transparent pour OBS) */
        body {
            margin: 0;
            padding: 0;
            /* La taille de l'écran est définie pour que tu puisses caler la source OBS en 1920x1080 */
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            background-color: transparent; 
        }

        /* --- FOND DE PRÉVISUALISATION (Caché par défaut, utile pour tester) --- */
        .preview-bg {
            position: absolute;
            inset: 0;
            background-color: #030005;
            background-image: radial-gradient(circle, rgba(149,255,102,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
            display: none; /* Change en 'block' si tu veux voir le fond dans ton navigateur */
        }

        /* --- EFFET GLASSMORPHISM --- */
        .glass {
            background: rgba(5, 5, 5, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(149, 255, 102, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* --- ANIMATION FLOTTAISON --- */
        .anim-float {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); } 
        }
    </style>
</head>
<body>

    <!-- Fond de prévisualisation (désactivé par défaut) -->
    <div class="preview-bg" id="preview-bg"></div>
    
    <!-- Bouton Dev (à supprimer si tu redimensionnes la source OBS pile sur le widget) -->
    <button onclick="toggleBackground()" class="absolute top-4 left-4 z-50 bg-brand text-black px-3 py-1 text-xs font-black uppercase rounded hover:bg-white transition-colors">
        Afficher/Cacher Fond
    </button>

    <!-- ========================================== -->
    <!-- WIDGET RÉSEAUX SOCIAUX                     -->
    <!-- ========================================== -->
    <div class="absolute bottom-12 right-12 glass p-2 rounded-2xl flex items-center gap-2 anim-float">
        <!-- Étiquette Fixe -->
        <div class="bg-brand text-black font-black uppercase text-[10px] px-3 py-2 rounded-xl tracking-widest">
            Réseaux
        </div>
        
        <!-- Zone Rotative -->
        <div class="relative w-32 h-8 overflow-hidden flex items-center ml-2" id="social-rotator">
            <div class="absolute w-full flex items-center gap-3 transition-transform duration-500" id="social-track">
                
                <!-- 1. Insta -->
                <div class="flex items-center gap-2 w-32 shrink-0">
                    <i class="fa-brands fa-instagram text-brand"></i>
                    <span class="font-black text-xs tracking-wider">@adamxbc</span>
                </div>
                
                <!-- 2. Twitch -->
                <div class="flex items-center gap-2 w-32 shrink-0">
                    <i class="fa-brands fa-twitch text-brand"></i>
                    <span class="font-black text-xs tracking-wider">/adamxbc</span>
                </div>
                
                <!-- 3. TikTok -->
                <div class="flex items-center gap-2 w-32 shrink-0">
                    <i class="fa-brands fa-tiktok text-brand"></i>
                    <span class="font-black text-xs tracking-wider">@adamxbc</span>
                </div>
                
                <!-- 4. Discord -->
                <div class="flex items-center gap-2 w-32 shrink-0">
                    <i class="fa-brands fa-discord text-brand"></i>
                    <span class="font-black text-xs tracking-wider">NGC STARS</span>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // --- LOGIQUE DE ROTATION ---
        const socialTrack = document.getElementById('social-track');
        let currentSocial = 0;
        const totalSocials = 4;
        
        // Largeur d'un item (32 rem = 128px) + l'écart gap-3 (12px)
        const socialWidth = 128 + 12; 

        setInterval(() => {
            currentSocial = (currentSocial + 1) % totalSocials;
            socialTrack.style.transform = `translateX(-${currentSocial * socialWidth}px)`;
        }, 4000); // Change toutes les 4 secondes

        // --- DEV : AFFICHER/CACHER LE FOND ---
        function toggleBackground() {
            const bg = document.getElementById('preview-bg');
            bg.style.display = bg.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
